<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <title>Spreadsheet</title>
</head>
<body>

<!-- Add new Modal -->
<div class="modal fade" id="add-new-model" tabindex="-1" aria-labelledby="add-new-model Label" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="add-new-model Label">Add new Customers</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form class="js-add-user-form" onsubmit="add_new(event)">
      <input type="hidden" id="user_id" name="id" value="">
      <div class="modal-body">
            <label  class="mt-2 d-block" style="cursor: pointer; text-align: center;">
              <img src="images/users.jpeg"  class="js-add-image mx-auto d-block" style="width: 150px; height: 150px; object-fit: cover;">
              <input id="image" onchange="display_image(this.files[0])" type="file" name="image" class="">
              <script>
                function display_image(file)
                {
                    document.querySelector('.js-add-image').src = URL.createObjectURL(file);
                }
              </script>
            </label>

            <div class="mt-2">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" placeholder="Name" required>
            </div>

            <div class="mt-2">
                <label for="age" class="form-label">Age</label>
                <input type="number" min="1"  max="100" class="form-control" id="age" placeholder="Age" required>
            </div>

            <div class="mt-2">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="Email Address" required>
            </div>

            <div class="mt-2">
                <label for="city" class="form-label">City</label>
                <input type="text" class="form-control" id="city" placeholder="City" required>
            </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </div>
      </form>
    </div>
  </div>
</div>
<!-- End new Modal -->

<div class="table-responsive col-md-10 mx-auto">
  <h2 class="my-2 text-center">Spreadsheet</h2>
  <h4 class="my-3">Customers</h4>
  <table class="table table-striped table-hover">
      <tr>
        <th>#ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Image</th>
        <th>City</th>
        <th rowspan="2">Action <button onclick="addMoadl.show()" data-bs-toggle="modal" data-bs-target="#add-new-model" class="btn btn-primary btn-sm">New</button></th>
      </tr>
      <tbody class="js-table-body">
           
      </tbody>
  </table>
</div>
 
</body>
</html>
<script src="js/bootstrap.bundle.min.js"></script>
<script>

  const addModalElement = document.getElementById("add-new-model");
  const addMoadl = bootstrap.Modal.getOrCreateInstance(addModalElement);
  let currentData = [];
  let editId = null;

  send_data({}, "read");

  function send_data(obj, type)
  {
      var form;
      if (obj instanceof FormData) {
        form = obj;
      } else {
        form = new FormData();
        for(key in obj)
        {
          form.append(key, obj[key]);
        }
      }

      form.append('data_type', type)

      var ajax = new XMLHttpRequest();

      ajax.addEventListener('readystatechange', function(){

          if(ajax.readyState == 4)
          {
            if(ajax.status == 200)
            {
              handle_result(ajax.responseText); 
            }else{
              alert("an error occured");
            }
          }
      })

      ajax.open('post', 'api.php', true);
      ajax.send(form);
  }

  function handle_result(result)
  {
    console.log(result);
    var obj = JSON.parse(result);
    if(typeof obj == 'object')
    {
      if(obj.data_type == 'read')
      {
        let tbody = document.querySelector(".js-table-body");
        let str = "";

        if(Array.isArray(obj.data))
        {
            currentData = obj.data;
            for(var i = 0; i < obj.data.length; i++){
              let row = obj.data[i];
              console.log(row);
              str += `<tr><td>${row.id}</td><td>${row.name}</td><td>${row.email}</td><td>${row.age}</td><td><img src="${row.image}" style="width: 50px; height: 50px; object-fit: cover;"/></td><td>${row.city}</td><td><button onclick="edit_row(${row.id})" class="btn btn-primary btn-sm">Edit</button><button onclick="delete_row(${row.id})" class="btn btn-danger btn-sm">Delete</button></td></tr>`;
            }
        }else{
          str = "<tr><td>No records found!</td></tr>"
        } 
          tbody.innerHTML = str;
      } else if(obj.data_type == 'save' || obj.data_type == 'update') {
        // If save/update succeeded, refresh the list and notify user
        if(obj.data === true || (Array.isArray(obj.data) === false && obj.data)){
          send_data({}, 'read');
          editId = null;
          document.getElementById('user_id').value = '';
          document.querySelector('.js-add-image').src = 'images/users.jpeg';
          //alert(obj.data_type == 'save' ? 'Saved successfully' : 'Updated successfully');
        } else {
          alert(obj.data_type == 'save' ? 'Save failed' : 'Update failed');
        }
      } else if(obj.data_type == 'delete') {
        // If delete succeeded, refresh the list and notify user
        if(obj.data === true || (Array.isArray(obj.data) === false && obj.data)){
          send_data({}, 'read');
          alert('Deleted successfully');
        } else {
          alert('Delete failed');
        }
      }
    }
  }

  function add_new(e)
  {
    e.preventDefault();
    let form = new FormData();
    let inputs = e.currentTarget.querySelectorAll("input, select, textarea");

    let imagePicked = false;
    for (let i = 0; i < inputs.length; i++) {
      let el = inputs[i];
      let key = el.name || el.id;
      if(!key) continue;
      if (el.type === 'file') {
        if (el.files && el.files.length > 0) {
          form.append(key, el.files[0]);
          imagePicked = true;
        }
      } else {
        form.append(key, el.value);
      }
    }

    if (!editId && !imagePicked) {
      alert('Please select an image.');
      return;
    }

    if (editId) {
      form.append('id', editId);
      send_data(form, 'update');
    } else {
      send_data(form, 'save');
    }

    addMoadl.hide();
  }

  function delete_row(id)
  {
    if(!confirm("Are you sure you want to delete row number "+id+"?"))
    {
      return;
    }

    send_data({id:id}, 'delete');
  }

  function edit_row(id)
  {
    editId = id;
    let row = currentData.find(function(item){ return parseInt(item.id) === parseInt(id); });
    if (!row) return;

    document.getElementById('user_id').value = row.id;
    document.getElementById('name').value = row.name;
    document.getElementById('age').value = row.age;
    document.getElementById('email').value = row.email;
    document.getElementById('city').value = row.city;
    document.querySelector('.js-add-image').src = row.image || 'images/users.jpeg';
    addMoadl.show();
  }
</script>
